<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRPG VN Player: Custom Standing Edition</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap">
    <style>
        :root {
            --accent-color: #d1d1d1;
            --cur-accent: #d1d1d1;
            --text-color: #ffffff;
            --font-family: 'Noto Sans KR', sans-serif;
            --letter-spacing: 0px;
            --line-height: 1.8;
            --font-size: 1.1rem;
            --bg-dim: 0.6;
            --box-opacity: 0.85;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #0d0d0f; font-family: var(--font-family); color: var(--text-color); overflow: hidden; height: 100vh; touch-action: manipulation; }

        /* --- 드래그 제어 --- */
        #game-frame, #start-screen, #name-tag, #dialogue-area {
            user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
        }
        #history-panel { user-select: text !important; -webkit-user-select: text !important; }

        /* --- UI 레이아웃 --- */
        #main-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-screen { position: absolute; inset: 0; z-index: 5000; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #game-frame { position: relative; width: 100%; height: 100%; max-width: 1280px; margin: auto; background: #000; overflow: hidden; display: none; contain: layout; }

        /* --- 배경 및 우측 스탠딩 --- */
        #bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(var(--bg-dim)); transition: 0.8s; z-index: 1; }
        #character-layer { position: absolute; inset: 0; display: flex; justify-content: flex-end; align-items: flex-end; padding-right: 5%; pointer-events: none; z-index: 5; }
        
        #char-standing { 
            height: 95%; max-width: 60%; object-fit: contain; 
            transition: opacity 0.5s ease, transform 0.5s ease; 
            opacity: 0; filter: brightness(0.8); transform: translateX(50px);
            will-change: transform, opacity;
        }
        #char-standing.active { opacity: 1; filter: brightness(1); transform: translateX(0); }

        /* --- 대사창 & 이름창 (5종 테마) --- */
        #dialogue-area { position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; z-index: 100; padding: 0 4% 30px 4%; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; }
        #dialogue-box { height: 100%; position: relative; padding: 35px 50px; transition: 0.3s; border-radius: 4px; }
        
        .box-modern { background: linear-gradient(rgba(30,30,35, var(--box-opacity)), rgba(15,15,20, 0.98)); border-top: 3px solid var(--cur-accent); }
        .box-glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; }
        .box-cyber { background: rgba(5, 5, 10, 0.95); border: 2px solid var(--cur-accent); clip-path: polygon(0 0, 97% 0, 100% 15%, 100% 100%, 3% 100%, 0 85%); }
        .box-classic { background: #000; border: 4px double #777; }
        .box-minimal { background: rgba(0,0,0,0.7); border-left: 10px solid var(--cur-accent); }

        #name-tag { position: absolute; top: -18px; left: 40px; padding: 6px 35px; font-weight: 700; z-index: 110; min-width: 100px; text-align: center; transition: 0.3s; }
        .name-tag { background: var(--cur-accent); color: #000; border-radius: 2px; }
        .name-ribbon { background: #111; color: var(--cur-accent); border-bottom: 2px solid var(--cur-accent); }
        .name-floating { background: none; color: var(--cur-accent); font-size: 1.6rem; text-shadow: 2px 2px 4px #000; top: -45px !important; text-align: left; left: 20px !important; }
        .name-badge { background: #fff; color: #000; border-radius: 50px; }
        .name-neon { border: 1px solid var(--cur-accent); color: var(--cur-accent); background: rgba(0,0,0,0.8); text-shadow: 0 0 8px var(--cur-accent); border-radius: 10px; }

        #text-content { font-size: var(--font-size); line-height: var(--line-height); letter-spacing: var(--letter-spacing); white-space: pre-wrap; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); word-break: break-word; }
        #next-icon { position: absolute; bottom: 20px; right: 30px; width: 14px; height: 14px; background: var(--cur-accent); animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(6px); opacity: 1; } }

        /* --- 설정 패널 (카드 디자인) --- */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100%; background: #121214; z-index: 2000; transition: 0.4s ease; padding: 30px; overflow-y: auto; border-left: 1px solid #333; }
        .side-panel.open { right: 0; }
        .setting-card { background: #1c1c21; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #2d2d35; }
        .setting-card h3 { font-size: 13px; color: var(--accent-color); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        input, select { width: 100%; padding: 12px; background: #0c0c0f; border: 1px solid #333; color: #fff; border-radius: 6px; font-size: 13px; }
        .control-btn { background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .control-btn:hover { background: var(--accent-color); color: #000; }

        /* 검색 & 히스토리 */
        .search-bar { position: sticky; top: -30px; z-index: 100; background: #121214; padding: 15px 0; }
        .search-input { width: 100%; padding: 12px; background: #1a1a20; border: 1px solid var(--accent-color); color: #fff; border-radius: 8px; }
        .history-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s; }
        .history-item:hover { background: rgba(255,255,255,0.05); }

        /* 캐릭터 설정 카드 */
        .char-card { background: #0a0a0c; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 10px; }

        @media (max-aspect-ratio: 1/1) {
            #game-frame { aspect-ratio: auto; height: 100vh; }
            #dialogue-area { height: 45%; padding-bottom: 20px; }
            #char-standing { height: 75%; max-width: 90%; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <div id="start-screen">
        <h2 style="color:var(--accent-color); margin-bottom:20px; letter-spacing: 5px;">V N  P L A Y E R</h2>
        <div id="upload-box" style="background:#1a1a1a; padding:40px; border-radius:20px; width:90%; max-width:500px; text-align:center; border: 1px solid #333;">
            <input type="file" id="log-input" accept=".html" style="margin-bottom:20px;">
            <button id="start-btn" class="control-btn" style="width:100%; padding:18px; font-size: 14px;" onclick="processLog()">변환 및 시작</button>
            <div id="load-info" style="display:none; margin-top:20px;">
                <div style="width:100%; height:4px; background:#222; border-radius:10px; overflow:hidden;">
                    <div id="load-progress" style="width:0%; height:100%; background:var(--accent-color);"></div>
                </div>
                <p id="count-text" style="color:#666; font-size:11px; margin-top:10px;">0 / 0</p>
                <p id="eta-text" style="color:#444; font-size:10px; margin-top:5px;">파일 분석 중...</p>
            </div>
        </div>
    </div>

    <div id="game-frame">
        <div id="bg-layer"></div>
        <div id="character-layer">
            <img id="char-standing" src="" alt="">
        </div>
        <div style="position:absolute; top:20px; right:20px; z-index:1000; display:flex; gap:10px;">
            <button class="control-btn" onclick="togglePanel('history-panel')">LOG / SEARCH</button>
            <button class="control-btn" onclick="togglePanel('config-panel')">SETTINGS</button>
        </div>
        <div id="dialogue-area" onclick="handleInteraction()">
            <div id="dialogue-box" class="box-modern">
                <div id="name-tag" class="name-tag">System</div>
                <div id="text-content">로그를 불러오는 중입니다...</div>
                <div id="next-icon" class="icon-down"></div>
            </div>
        </div>
    </div>
</div>

<!-- 설정 패널 -->
<div id="config-panel" class="side-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2 style="color:var(--accent-color)">SETTINGS</h2>
        <button class="control-btn" onclick="togglePanel('config-panel')">CLOSE</button>
    </div>
    
    <div class="setting-card">
        <h3>Global Setting</h3>
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <span style="font-size:13px;">전체 스탠딩 표시</span>
            <input type="checkbox" id="toggle-standing-global" checked onchange="render()" style="width:18px; height:18px;">
        </div>
    </div>

    <div class="setting-card">
        <h3>Styles</h3>
        <select id="sel-box" onchange="updateUI()" style="margin-bottom:8px;"><option value="box-modern">Modern</option><option value="box-glass">Glass</option><option value="box-cyber">Cyber</option><option value="box-classic">Classic</option><option value="box-minimal">Minimal</option></select>
        <select id="sel-name" onchange="updateUI()" style="margin-bottom:8px;"><option value="name-tag">Solid Box</option><option value="name-ribbon">Ribbon</option><option value="name-floating">Floating</option><option value="name-badge">Badge</option><option value="name-neon">Neon</option></select>
        <select id="sel-icon" onchange="updateUI()"><option value="icon-down">Arrow Down</option><option value="icon-diamond">Diamond</option><option value="icon-circle">Circle</option><option value="icon-right">Arrow Right</option><option value="icon-star">Star</option></select>
    </div>

    <div class="setting-card">
        <h3>Individual Character Expert</h3>
        <div id="char-settings-list"></div>
    </div>

    <div class="setting-card">
        <h3>Media & Theme</h3>
        <input type="file" accept="audio/*" onchange="loadMedia(this, 'audio')" style="margin-bottom:10px;">
        <input type="file" accept="image/*" onchange="loadMedia(this, 'bg')" style="margin-bottom:10px;">
        <input type="text" id="font-name" placeholder="Google Font Name" onchange="updateFont()" style="margin-bottom:10px;">
        <input type="color" id="p-accent" value="#d1d1d1" oninput="updateUI()" style="height:40px; margin-bottom:10px;">
        <input type="range" id="p-dim" min="0" max="1" step="0.05" value="0.6" oninput="updateUI()">
    </div>
</div>

<!-- 히스토리 패널 -->
<div id="history-panel" class="side-panel">
    <button class="control-btn" style="float:right" onclick="togglePanel('history-panel')">CLOSE</button>
    <h2 style="margin-bottom:20px; color:var(--accent-color)">LOG & SEARCH</h2>
    <div class="search-bar">
        <input type="text" id="log-search" class="search-input" placeholder="전체 로그 검색..." oninput="renderHistory()">
    </div>
    <div id="history-content"></div>
</div>

<audio id="bgm-player" loop></audio>

<script>
    let originalLogs = []; 
    let frames = [];       
    let currentIndex = -1;
    let isTyping = false;
    let typeTimer = null;
    let skipInterval = null;
    
    let charConfigs = {};  
    let charLastImg = {};  
    let actors = [];
    const NARRATORS = new Set(["System", "나레이션", "나레이터", "■", "-", "NONAME", "...", "알림"]);
    const CHAR_LIMIT = 115;

    // --- 1. 파싱 엔진 (스탠딩 이미지 수집 강화) ---
    async function processLog() {
        const fileInput = document.getElementById('log-input');
        if(!fileInput.files[0]) return alert("로그 파일을 선택하세요.");
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('load-info').style.display = 'block';
        
        const text = await fileInput.files[0].text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const rows = Array.from(doc.getElementsByClassName('gap'));
        const total = rows.length;

        originalLogs = []; actors = [];
        const startTime = performance.now();

        for(let i = 0; i < total; i++) {
            const row = rows[i];
            let name = "System";
            const boldElements = row.querySelectorAll('span[style*="bold"], b');
            for(let el of boldElements) {
                const txt = el.innerText.trim();
                if (txt && !/^\d{4}\/\d{2}\/\d{2}$/.test(txt)) { name = txt; break; }
            }

            const imgTag = row.querySelector('.msg_container img') || row.querySelector('img');
            const img = imgTag ? imgTag.getAttribute('src') || imgTag.src : "";
            
            const p = row.querySelector('p');
            let dialogueText = "";
            if (p) {
                let brFound = false;
                p.childNodes.forEach(node => {
                    if (node.nodeName === "BR") { brFound = true; return; }
                    if (brFound && node.nodeName !== "B") dialogueText += node.textContent || "";
                });
            }
            if (!dialogueText.trim() && p) {
                dialogueText = p.innerText.replace(name, "").replace(/-\s*\d{4}\/\d{2}\/\d{2}/g, "").trim();
            }
            if (!dialogueText.trim()) continue;

            if (!NARRATORS.has(name) && !actors.includes(name)) {
                actors.push(name);
                charConfigs[name] = { color: '#d1d1d1', img: null, splitParens: false, showStanding: true };
            }
            originalLogs.push({ name, text: dialogueText, img });

            if(i % 50 === 0 || i === total - 1) {
                const progress = (i / (total-1)) * 100;
                document.getElementById('load-progress').style.width = progress + '%';
                document.getElementById('count-text').innerText = `${i+1} / ${total}`;
                await new Promise(r => setTimeout(r, 0));
            }
        }
        buildCharSettingsUI(); rebuildFrames();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-frame').style.display = 'block';
        nextStep();
    }

    // --- 2. 우클릭 스킵 ---
    window.addEventListener('mousedown', (e) => {
        if (e.button === 2 && currentIndex >= 0) {
            if (skipInterval) clearInterval(skipInterval);
            skipInterval = setInterval(() => { isTyping = false; nextStep(); }, 60);
        }
    });
    window.addEventListener('mouseup', (e) => { if (e.button === 2) { clearInterval(skipInterval); skipInterval = null; } });
    window.addEventListener('contextmenu', e => e.preventDefault());

    // --- 3. 렌더링 시스템 (개별 스탠딩 온오프 반영) ---
    function render() {
        if (!frames[currentIndex]) return;
        const f = frames[currentIndex];
        
        const nameTag = document.getElementById('name-tag');
        const textEl = document.getElementById('text-content');
        const standingImg = document.getElementById('char-standing');
        
        const globalShow = document.getElementById('toggle-standing-global').checked;
        const charConfig = charConfigs[f.name] || { color: '#d1d1d1', showStanding: true };
        
        document.documentElement.style.setProperty('--cur-accent', charConfig.color);

        if(f.isNarration) {
            nameTag.style.display = "none";
            textEl.style.fontStyle = "italic";
            textEl.style.color = "rgba(255,255,255,0.7)";
        } else {
            nameTag.style.display = "block";
            nameTag.innerText = f.name;
            textEl.style.fontStyle = "normal";
            textEl.style.color = "var(--text-color)";
        }

        // 스탠딩 로직: 글로벌 온 * 캐릭터 개별 온 * 이미지 존재 여부
        const displayImg = charConfig.img || f.img || charLastImg[f.name] || "";
        if(f.img && f.img !== "") charLastImg[f.name] = f.img;

        if (globalShow && charConfig.showStanding && displayImg) {
            standingImg.classList.remove('active');
            setTimeout(() => {
                standingImg.src = displayImg;
                standingImg.classList.add('active');
            }, 10);
        } else {
            standingImg.classList.remove('active');
        }

        type(f.text, textEl);
    }

    function type(text, el) {
        if(typeTimer) clearInterval(typeTimer);
        el.innerText = ""; isTyping = true; let i = 0;
        typeTimer = setInterval(() => {
            if(!isTyping) { el.innerText = text; clearInterval(typeTimer); return; }
            el.innerText += text[i++];
            if(i >= text.length) { isTyping = false; clearInterval(typeTimer); }
        }, 20);
    }

    function nextStep() {
        if (currentIndex >= frames.length - 1) return;
        currentIndex++; render();
    }

    function handleInteraction() { if (isTyping) isTyping = false; else nextStep(); }

    // --- 4. 검색 & 점프 ---
    function renderHistory() {
        const query = document.getElementById('log-search').value.toLowerCase();
        const h = document.getElementById('history-content');
        let html = "";
        originalLogs.forEach((log, i) => {
            if (query && !log.text.toLowerCase().includes(query) && !log.name.toLowerCase().includes(query)) return;
            html += `<div class="history-item" onclick="jump(${i})"><div class="history-name" style="color:${charConfigs[log.name]?.color || 'var(--accent-color)'}">${log.name}</div><div style="font-size:14px; color:#eee; white-space:pre-wrap;">${log.text}</div></div>`;
        });
        h.innerHTML = html;
    }

    function jump(orgIdx) {
        charLastImg = {};
        for(let i = 0; i <= orgIdx; i++) { if(originalLogs[i].img) charLastImg[originalLogs[i].name] = originalLogs[i].img; }
        const target = frames.findIndex(f => f.orgIdx === orgIdx);
        if(target !== -1) { currentIndex = target; render(); togglePanel('history-panel'); }
    }

    // --- 5. 개별 설정 UI (체크박스 추가) ---
    function buildCharSettingsUI() {
        const list = document.getElementById('char-settings-list');
        list.innerHTML = "";
        actors.forEach(name => {
            const card = document.createElement('div');
            card.className = "char-card";
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <span style="font-size:13px; font-weight:bold; color:#fff;">${name}</span>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <span style="font-size:10px; color:#888;">표시</span>
                        <input type="checkbox" ${charConfigs[name].showStanding ? 'checked' : ''} onchange="updateCharConfig('${name}', 'showStanding', this.checked)" style="width:15px; height:15px;">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                    <input type="color" value="${charConfigs[name].color}" oninput="updateCharConfig('${name}', 'color', this.value)" style="height:35px; padding:2px;">
                    <select onchange="updateCharConfig('${name}', 'splitParens', this.value === 'true')" style="padding:5px; font-size:11px;">
                        <option value="false">지문 포함</option>
                        <option value="true">지문 분리</option>
                    </select>
                </div>
                <input type="file" accept="image/*" onchange="updateCharImg('${name}', this)" style="margin-top:10px; font-size:10px;">
            `;
            list.appendChild(card);
        });
    }

    function updateCharConfig(name, key, val) { charConfigs[name][key] = val; rebuildFrames(); render(); }
    function updateCharImg(name, input) { if(input.files[0]) { charConfigs[name].img = URL.createObjectURL(input.files[0]); rebuildFrames(); render(); } }
    function togglePanel(id) { document.getElementById(id).classList.toggle('open'); if(id === 'history-panel') renderHistory(); }
    function updateUI() {
        const root = document.documentElement.style;
        root.setProperty('--accent-color', document.getElementById('p-accent').value);
        root.setProperty('--font-size', document.getElementById('p-size').value + 'rem');
        root.setProperty('--letter-spacing', document.getElementById('p-spacing').value + 'px');
        root.setProperty('--line-height', document.getElementById('p-height').value);
        root.setProperty('--bg-dim', document.getElementById('p-dim').value);
        document.getElementById('dialogue-box').className = document.getElementById('sel-box').value;
        document.getElementById('name-tag').className = document.getElementById('sel-name').value;
        document.getElementById('next-icon').className = document.getElementById('sel-icon').value;
        render();
    }
    function updateFont() {
        const name = document.getElementById('font-name').value;
        if(!name) return;
        const link = document.getElementById('google-font-link');
        link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/\s+/g, '+')}:wght@300;400;700&display=swap`;
        document.documentElement.style.setProperty('--font-family', `'${name}', sans-serif`);
    }

    function rebuildFrames() {
        const savedOrgIdx = currentIndex >= 0 ? frames[currentIndex].orgIdx : -1;
        frames = [];
        originalLogs.forEach((log, orgIdx) => {
            const config = charConfigs[log.name] || { splitParens: false };
            if (config.splitParens) {
                const chunks = log.text.split(/(\([^)]*\))/g).filter(v => v && v.trim());
                chunks.forEach(chunk => {
                    const isParens = chunk.trim().startsWith('(');
                    pushToFrames(log.name, chunk.trim(), log.img, isParens || NARRATORS.has(log.name), orgIdx);
                });
            } else {
                pushToFrames(log.name, log.text, log.img, NARRATORS.has(log.name), orgIdx);
            }
        });
        if (savedOrgIdx !== -1) {
            const found = frames.findIndex(f => f.orgIdx === savedOrgIdx);
            if(found !== -1) currentIndex = found;
        }
    }

    function pushToFrames(name, text, img, isNarration, orgIdx) {
        if (text.length > CHAR_LIMIT) {
            const subChunks = text.match(new RegExp(`.{1,${CHAR_LIMIT}}`, 'g')) || [text];
            subChunks.forEach(c => frames.push({ name, text: c, img, isNarration, orgIdx }));
        } else {
            frames.push({ name, text, img, isNarration, orgIdx });
        }
    }

    function loadMedia(input, type) {
        const url = URL.createObjectURL(input.files[0]);
        if(type === 'audio') { const p = document.getElementById('bgm-player'); p.src = url; p.play(); }
        else { document.getElementById('bg-layer').style.backgroundImage = `url(${url})`; }
    }
</script>
</body>
</html>
