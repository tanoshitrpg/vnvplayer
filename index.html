<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRPG VN Player</title>
    <link id="google-font-link" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap">
    <style>
        :root {
            --accent-color: #d1d1d1;
            --cur-accent: #d1d1d1;
            --box-accent: #d1d1d1;
            --name-accent: #d1d1d1;
            --icon-accent: #d1d1d1;
            --box-bg-color: #000000;
            --box-opacity: 0.85;
            --text-color: #ffffff;
            --font-family: 'Noto Sans KR', sans-serif;
            --letter-spacing: -0.5px;
            --line-height: 1.8;
            --font-size: 1.2rem;
            --bg-dim: 0.5;
            --bg-blur: 0px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background-color: #050505; font-family: var(--font-family); color: var(--text-color); overflow: hidden; height: 100vh; touch-action: manipulation; }
        
        #game-frame, #start-screen, .name-wrapper, #dialogue-area { user-select: none; -webkit-user-select: none; }
        #history-panel { user-select: text !important; -webkit-user-select: text !important; }

        /* --- 레이아웃 --- */
        #main-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #start-screen { position: absolute; inset: 0; z-index: 5000; background: #0c0c0c; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #game-frame { position: relative; width: 100%; height: 100%; max-width: 1440px; margin: auto; background: #000; overflow: hidden; display: none; contain: layout; }

        /* --- 효과 레이어 --- */
        #bg-layer { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(var(--bg-dim)) blur(var(--bg-blur)); transition: 0.8s ease; z-index: 1; }
        #bottom-shadow { position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); z-index: 2; pointer-events: none; }
        #character-layer { position: absolute; inset: 0; display: flex; justify-content: flex-end; align-items: flex-end; padding-right: 5%; pointer-events: none; z-index: 5; }
        #char-standing { height: 95%; max-width: 65%; object-fit: contain; transition: 0.4s ease; opacity: 0; filter: brightness(0.9); transform: translateX(30px); will-change: transform, opacity; }
        #char-standing.active { opacity: 1; filter: brightness(1); transform: translateX(0); }

        /* --- 대사창 & 이름창 --- */
        #dialogue-area { position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; z-index: 100; padding: 0 4% 40px 4%; cursor: pointer; display: flex; flex-direction: column; justify-content: flex-end; }
        .name-wrapper { position: relative; width: 100%; height: 0; z-index: 120; pointer-events: none; }
        #name-tag { position: absolute; bottom: 15px; left: 30px; padding: 6px 40px; font-weight: 700; transition: 0.3s; min-width: 140px; text-align: center; font-size: 1.1rem; }

        #dialogue-box { height: 100%; position: relative; padding: 35px 55px; transition: 0.4s; z-index: 110; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }

        .box-modern { border-top: 3px solid var(--box-accent) !important; background: linear-gradient(rgba(30,30,35, var(--box-opacity)), rgba(10,10,12, 0.98)); border-radius: 4px; }
        .box-glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; border-top: 2px solid var(--box-accent) !important; }
        .box-cyber { background: rgba(5, 5, 10, 0.95); border: 2px solid var(--box-accent) !important; clip-path: polygon(0 0, 98% 0, 100% 20%, 100% 100%, 2% 100%, 0 80%); }
        .box-classic { background: rgba(0,0,0,0.9); border: 4px double var(--box-accent) !important; border-radius: 0; }
        .box-minimal { background: rgba(0,0,0,0.7); border-left: 10px solid var(--box-accent) !important; border-radius: 0; }

        .name-tag { background: var(--cur-accent); color: #000; border-radius: 2px; }
        .name-ribbon { background: #000; color: var(--cur-accent); border-bottom: 3px solid var(--cur-accent); border-radius: 0; }
        .name-floating { background: none; color: var(--cur-accent); font-size: 1.6rem; text-shadow: 2px 2px 6px #000; left: 0px !important; text-align: left; }
        .name-badge { background: #fff; color: #000; border-radius: 50px; border: 1.5px solid var(--cur-accent); }
        .name-neon { border: 1px solid var(--cur-accent); color: var(--cur-accent); background: rgba(0,0,0,0.8); text-shadow: 0 0 10px var(--cur-accent); border-radius: 8px; }

        #text-content { font-size: var(--font-size); line-height: var(--line-height); letter-spacing: var(--letter-spacing); white-space: pre-wrap; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); word-break: break-word; color: var(--text-color); }
        
        /* NEXT 아이콘 */
        #next-icon { position: absolute; bottom: 20px; right: 30px; width: 14px; height: 14px; background: var(--icon-accent); animation: bounce 1s infinite; z-index: 130; }
        .icon-down { clip-path: polygon(100% 0, 0 0, 50% 100%); }
        .icon-diamond { transform: rotate(45deg); clip-path: none !important; }
        .icon-circle { border-radius: 50%; clip-path: none !important; }
        .icon-right { clip-path: polygon(100% 50%, 0 0, 0 100%); }
        .icon-square { clip-path: none !important; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(8px); opacity: 1; } }

        /* --- 설정 패널 --- */
        .side-panel { position: fixed; top: 0; right: -100%; width: 100%; max-width: 500px; height: 100%; background: #0f0f11; z-index: 2000; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); padding: 40px; overflow-y: auto; border-left: 1px solid #222; }
        .side-panel.open { right: 0; }
        .setting-card { background: #18181d; padding: 25px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #2a2a30; }
        .setting-card h3 { font-size: 12px; color: #888; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #333; padding-bottom: 8px; }
        
        .setting-item { margin-bottom: 20px; }
        .setting-item label { display: block; font-size: 11px; color: #666; margin-bottom: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #0a0a0c; border: 1px solid #333; color: #fff; border-radius: 8px; font-size: 13px; }
        
        /* 버튼 디자인 개선 */
        .control-btn { 
            background: rgba(255,255,255,0.05); border: 1px solid #444; color: #fff; 
            padding: 12px 24px; border-radius: 50px; cursor: pointer; font-size: 11px; 
            font-weight: bold; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .control-btn:hover { background: var(--accent-color); color: #000; border-color: var(--accent-color); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* 히스토리 UI */
        .history-item { 
            display: grid; grid-template-columns: 140px 1fr; gap: 20px;
            padding: 18px 15px; border-radius: 8px; cursor: pointer; transition: 0.2s;
            border-left: 4px solid transparent; background: rgba(255,255,255,0.02); margin-bottom: 4px;
        }
        .history-item:hover { background: rgba(255,255,255,0.06); border-left-color: var(--accent-color); }
        .history-name-box { font-size: 12px; font-weight: bold; text-align: right; color: var(--accent-color); }
        .history-text-box { font-size: 14px; line-height: 1.6; color: #ddd; white-space: pre-wrap; }

        .char-dense-card { background: #111114; border: 1px solid #222; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 140px; gap: 8px; align-items: center; }
        .char-dense-name { font-size: 12px; font-weight: bold; color: #eee; }
        .char-dense-controls { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
        .char-dense-controls input[type="color"] { width: 30px; height: 30px; padding: 0; border: none; background: none; cursor: pointer; }

        @media (max-aspect-ratio: 1/1) {
            #game-frame { aspect-ratio: auto; height: 100vh; }
            #dialogue-area { height: 42%; }
            .history-item { grid-template-columns: 100px 1fr; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <div id="start-screen">
        <h2 style="color:#fff; margin-bottom:25px; letter-spacing: 5px; font-weight: 300;">VN LOG PLAYER</h2>
        <div id="upload-box" style="background:#16161a; padding:40px; border-radius:20px; width:90%; max-width:550px; text-align:center; border: 1px solid #222;">
            <p style="color:#888; font-size:13px; margin-bottom:20px;">코코포리아 로그 HTML 파일을 업로드하세요.</p>
            <input type="file" id="log-input" accept=".html" style="margin-bottom:25px; color:#444;">
            <button id="start-btn" class="control-btn" style="width:100%; padding:18px; font-size: 14px;" onclick="processLog()">변환 및 시작</button>
            <div id="guide-text" style="margin-top:25px; text-align:left; font-size:11px; color:#666; line-height:1.7; background: #000; padding:20px; border-radius:15px; border: 1px solid #222;">
                <b>[조작 가이드]</b><br>
                - 왼쪽 클릭: 다음 대사<br>
                - 오른쪽 클릭 유지: 고속 스킵<br>
                - LOG / SEARCH: 대사 검색 및 장면 이동<br>
                - CONFIG: 테마 및 캐릭터 개별 설정
            </div>
            <div id="load-info" style="display:none; margin-top:20px;">
                <div style="width:100%; height:2px; background:#222;"><div id="load-progress" style="width:0%; height:100%; background:var(--accent-color);"></div></div>
                <p id="count-text" style="color:#666; font-size:11px; margin-top:10px;">0 / 0</p>
            </div>
        </div>
    </div>

    <div id="game-frame">
        <div id="bg-layer"></div>
        <div id="bottom-shadow"></div>
        <div id="character-layer"><img id="char-standing" src=""></div>

        <div style="position:absolute; top:20px; right:20px; z-index:1000; display:flex; gap:10px;">
            <button class="control-btn" onclick="togglePanel('history-panel')">LOG / SEARCH</button>
            <button class="control-btn" onclick="togglePanel('config-panel')">CONFIG</button>
        </div>

        <div id="dialogue-area" onclick="handleInteraction()">
            <div class="name-wrapper"><div id="name-tag" class="name-tag">System</div></div>
            <div id="dialogue-box" class="box-modern">
                <div id="text-content">로그를 불러오는 중입니다...</div>
                <div id="next-icon" class="icon-down"></div>
            </div>
        </div>
    </div>
</div>

<!-- 설정 패널 -->
<div id="config-panel" class="side-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 style="color:#fff; font-size: 18px;">SETTINGS</h2>
        <button class="control-btn" onclick="togglePanel('config-panel')">CLOSE</button>
    </div>
    
    <div class="setting-card">
        <h3>Theme Palette</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
            <div class="setting-item"><label>대사창</label><input type="color" id="p-box-acc" value="#d1d1d1" oninput="updateUI()"></div>
            <div class="setting-item"><label>이름표</label><input type="color" id="p-name-acc" value="#d1d1d1" oninput="updateUI()"></div>
            <div class="setting-item"><label>아이콘</label><input type="color" id="p-icon-acc" value="#d1d1d1" oninput="updateUI()"></div>
        </div>
    </div>

    <div class="setting-card">
        <h3>Design Styles</h3>
        <div class="setting-item">
            <select id="sel-box" onchange="updateUI()"><option value="box-modern">Modern Gradient</option><option value="box-glass">Crystal Glass</option><option value="box-cyber">Cyber Neon</option><option value="box-classic">Classic Border</option><option value="box-minimal">Minimalist Side</option></select>
            <select id="sel-name" onchange="updateUI()" style="margin-top:10px;"><option value="name-tag">Solid Box</option><option value="name-ribbon">Ribbon Tag</option><option value="name-floating">Floating Soul</option><option value="name-badge">Pill Badge</option><option value="name-neon">Neon Glow</option></select>
            <select id="sel-icon" onchange="updateUI()" style="margin-top:10px;"><option value="icon-down">Arrow Down</option><option value="icon-diamond">Diamond</option><option value="icon-circle">Circle</option><option value="icon-right">Arrow Right</option><option value="icon-square">Square</option></select>
        </div>
        <div style="display:flex; justify-content: space-between; align-items: center; margin-top:10px;">
            <label style="margin:0; font-size: 11px;">배경 이미지 자동 블러</label>
            <input type="checkbox" id="chk-blur" onchange="updateUI()" style="width:20px; height:20px; cursor:pointer;">
        </div>
    </div>

    <div class="setting-card">
        <h3>Characters</h3>
        <div id="char-settings-list" style="max-height: 250px; overflow-y: auto;"></div>
    </div>

    <div class="setting-card">
        <h3>Typography & Media</h3>
        <input type="text" id="font-name" placeholder="기기 폰트 혹은 구글 폰트명" onchange="updateFont()" style="margin-bottom:10px;">
        <input type="file" accept="audio/*" onchange="loadMedia(this, 'audio')" style="margin-bottom:10px;">
        <input type="file" accept="image/*" onchange="loadMedia(this, 'bg')" style="margin-bottom:10px;">
        <div class="setting-item">
            <label>대사창 배경색 / 투명도 / 배경 밝기</label>
            <input type="color" id="p-box-color" value="#000000" oninput="updateUI()">
            <input type="range" id="p-box-opacity" min="0" max="1" step="0.05" value="0.85" oninput="updateUI()" style="margin-top:8px;">
            <input type="range" id="p-dim" min="0" max="1" step="0.05" value="0.5" oninput="updateUI()" style="margin-top:8px;">
        </div>
    </div>
    <button class="control-btn" style="width:100%; color:#ff4d4d;" onclick="resetCache()">CACHE RESET</button>
</div>

<div id="history-panel" class="side-panel">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color:#fff; font-size: 18px;">HISTORY & SEARCH</h2>
        <button class="control-btn" onclick="togglePanel('history-panel')">CLOSE</button>
    </div>
    <div style="position:sticky; top:-10px; z-index:100; background:#0f0f11; padding:15px 0;">
        <input type="text" id="log-search" class="search-input" placeholder="이름이나 대사를 검색하세요..." oninput="renderHistory()">
    </div>
    <div id="history-content"></div>
</div>

<audio id="bgm-player" loop></audio>

<script>
    let originalLogs = []; let frames = []; let currentIndex = -1; let isTyping = false; let typeTimer = null;
    let actors = []; let charConfigs = {}; let charLastImg = {};
    const NARRATORS = new Set(["System", "나레이션", "나레이터", "■", "-", "NONAME", "...", "알림", "정보"]);
    const CHAR_LIMIT = 250;

    // --- 1. 캐시 시스템 ---
    function saveSettings() {
        localStorage.setItem('vn_ui_v3', JSON.stringify({
            boxS: document.getElementById('sel-box').value, nameS: document.getElementById('sel-name').value,
            iconS: document.getElementById('sel-icon').value, font: document.getElementById('font-name').value,
            boxC: document.getElementById('p-box-color').value, opacity: document.getElementById('p-box-opacity').value,
            size: 1.2, space: -0.5, height: 1.8, dim: document.getElementById('p-dim').value, blur: document.getElementById('chk-blur').checked,
            pBox: document.getElementById('p-box-acc').value, pName: document.getElementById('p-name-acc').value, pIcon: document.getElementById('p-icon-acc').value
        }));
        localStorage.setItem('vn_chars_v3', JSON.stringify(charConfigs));
    }

    function loadSettings() {
        const ui = JSON.parse(localStorage.getItem('vn_ui_v3'));
        if(ui) {
            document.getElementById('sel-box').value = ui.boxS; document.getElementById('sel-name').value = ui.nameS;
            document.getElementById('sel-icon').value = ui.iconS; document.getElementById('font-name').value = ui.font;
            document.getElementById('p-box-color').value = ui.boxC; document.getElementById('p-box-opacity').value = ui.opacity;
            document.getElementById('p-dim').value = ui.dim; document.getElementById('chk-blur').checked = ui.blur;
            document.getElementById('p-box-acc').value = ui.pBox || "#d1d1d1";
            document.getElementById('p-name-acc').value = ui.pName || "#d1d1d1";
            document.getElementById('p-icon-acc').value = ui.pIcon || "#d1d1d1";
            if(ui.font) updateFont();
        }
        const ch = JSON.parse(localStorage.getItem('vn_chars_v3'));
        if(ch) charConfigs = ch;
        updateUI();
    }

    // --- 2. 파싱 및 로직 ---
    async function processLog() {
        const fileInput = document.getElementById('log-input');
        if(!fileInput.files[0]) return alert("파일을 선택하세요.");
        document.getElementById('start-btn').style.display = 'none';
        document.getElementById('load-info').style.display = 'block';
        const text = await fileInput.files[0].text();
        const doc = new DOMParser().parseFromString(text, 'text/html');
        const rows = Array.from(doc.getElementsByClassName('gap'));
        
        originalLogs = []; actors = [];
        for(let i = 0; i < rows.length; i++) {
            const row = rows[i];
            const nameSpan = row.querySelector('span[style*="bold"], b:first-of-type');
            const name = nameSpan ? nameSpan.innerText.trim() : "System";
            const img = row.querySelector('img')?.getAttribute('src') || "";
            const p = row.querySelector('p');
            let dText = "";
            if (p) {
                let brFound = false;
                p.childNodes.forEach(node => {
                    if (node.nodeName === "BR") { brFound = true; return; }
                    if (brFound && node.nodeName !== "B") dText += node.textContent || "";
                });
            }
            if(!dText.trim() && p) dText = p.innerText.replace(name, "").replace(/-\s*\d{4}\/\d{2}\/\d{2}/g, "").trim();
            if(!dText.trim()) continue;
            
            if(!NARRATORS.has(name) && !actors.includes(name)) {
                actors.push(name);
                if(!charConfigs[name]) charConfigs[name] = { color: '#d1d1d1', img: null, splitParens: false, showStanding: true };
            }
            originalLogs.push({ name, text: dText, img });
            if(i % 100 === 0) {
                document.getElementById('load-progress').style.width = (i/rows.length*100)+'%';
                document.getElementById('count-text').innerText = `${i} / ${rows.length}`;
                await new Promise(r => setTimeout(r, 0));
            }
        }
        buildCharSettingsUI(); rebuildFrames();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-frame').style.display = 'block';
        nextStep();
    }

    function render() {
        if (!frames[currentIndex]) return;
        const f = frames[currentIndex];
        const nameTag = document.getElementById('name-tag');
        const textEl = document.getElementById('text-content');
        const standingImg = document.getElementById('char-standing');
        const config = charConfigs[f.name] || { color: '#d1d1d1', showStanding: true };
        
        document.documentElement.style.setProperty('--cur-accent', config.color);

        if(f.isNarration) {
            nameTag.style.display = "none";
            textEl.style.fontStyle = "italic";
            textEl.style.color = "rgba(255,255,255,0.6)";
        } else {
            nameTag.style.display = "block";
            nameTag.innerText = f.name;
            textEl.style.fontStyle = "normal";
            textEl.style.color = "var(--text-color)";
        }

        const displayImg = config.img || f.img || charLastImg[f.name] || "";
        if(f.img) charLastImg[f.name] = f.img;

        if (config.showStanding && displayImg) {
            if (standingImg.getAttribute('data-src') !== displayImg) {
                standingImg.classList.remove('active');
                standingImg.setAttribute('data-src', displayImg);
                setTimeout(() => { standingImg.src = displayImg; standingImg.classList.add('active'); }, 50);
            } else { standingImg.classList.add('active'); }
        } else { standingImg.classList.remove('active'); standingImg.removeAttribute('data-src'); }
        
        type(f.text, textEl);
    }

    function jump(orgIdx) {
        // 이미지 유실 방지: 처음부터 해당 지점까지 이미지를 다시 스캔하여 캐시 복구
        charLastImg = {};
        for(let i = 0; i <= orgIdx; i++) { if(originalLogs[i].img) charLastImg[originalLogs[i].name] = originalLogs[i].img; }
        
        // 프레임 인덱스 찾기
        const target = frames.findIndex(f => f.orgIdx === orgIdx);
        if(target !== -1) { 
            currentIndex = target; 
            isTyping = false; 
            if(typeTimer) clearInterval(typeTimer);
            render(); 
            togglePanel('history-panel'); 
        }
    }

    function type(text, el) {
        if(typeTimer) clearInterval(typeTimer);
        el.innerText = ""; isTyping = true; let i = 0;
        typeTimer = setInterval(() => {
            if(!isTyping) { el.innerText = text; clearInterval(typeTimer); return; }
            el.innerText += text[i++];
            if(i >= text.length) { isTyping = false; clearInterval(typeTimer); }
        }, 15);
    }

    function updateUI() {
        const r = document.documentElement.style;
        r.setProperty('--box-accent', document.getElementById('p-box-acc').value);
        r.setProperty('--name-accent', document.getElementById('p-name-acc').value);
        r.setProperty('--icon-accent', document.getElementById('p-icon-acc').value);
        r.setProperty('--box-bg-color', document.getElementById('p-box-color').value);
        r.setProperty('--box-opacity', document.getElementById('p-box-opacity').value);
        r.setProperty('--bg-dim', document.getElementById('p-dim').value);
        r.setProperty('--bg-blur', document.getElementById('chk-blur').checked ? '10px' : '0px');
        document.getElementById('dialogue-box').className = document.getElementById('sel-box').value;
        document.getElementById('name-tag').className = document.getElementById('sel-name').value;
        document.getElementById('next-icon').className = document.getElementById('sel-icon').value;
        saveSettings();
        if(currentIndex >= 0) render();
    }

    // --- 기타 기능 ---
    let skipInterval = null;
    window.addEventListener('mousedown', (e) => { if (e.button === 2 && currentIndex >= 0) skipInterval = setInterval(() => { isTyping = false; nextStep(); }, 60); });
    window.addEventListener('mouseup', (e) => { if (e.button === 2) { clearInterval(skipInterval); } });
    window.addEventListener('contextmenu', e => e.preventDefault());
    function handleInteraction() { if (isTyping) isTyping = false; else nextStep(); }
    function nextStep() { if (currentIndex < frames.length - 1) { currentIndex++; render(); } }
    function togglePanel(id) { document.getElementById(id).classList.toggle('open'); if(id === 'history-panel') renderHistory(); }
    function rebuildFrames() {
        const saved = currentIndex >= 0 ? frames[currentIndex].orgIdx : -1;
        frames = [];
        originalLogs.forEach((log, orgIdx) => {
            frames.push({ name: log.name, text: log.text, img: log.img, isNarration: NARRATORS.has(log.name), orgIdx });
        });
        if (saved !== -1) currentIndex = frames.findIndex(f => f.orgIdx === saved);
    }
    function updateFont() {
        const name = document.getElementById('font-name').value;
        if(!name) return;
        const link = document.getElementById('google-font-link');
        link.href = `https://fonts.googleapis.com/css2?family=${name.replace(/\s+/g, '+')}:wght@300;400;700&display=swap`;
        document.documentElement.style.setProperty('--font-family', `'${name}', sans-serif`);
        saveSettings();
    }
    function buildCharSettingsUI() {
        const list = document.getElementById('char-settings-list');
        list.innerHTML = "";
        actors.forEach(name => {
            const card = document.createElement('div'); card.className = "char-dense-card";
            card.innerHTML = `<div class="char-dense-name">${name}</div>
                <div class="char-dense-controls">
                    <input type="color" value="${charConfigs[name].color}" oninput="charConfigs['${name}'].color=this.value; updateUI();">
                    <input type="checkbox" ${charConfigs[name].showStanding ? 'checked' : ''} onchange="charConfigs['${name}'].showStanding=this.checked; render();" style="width:16px; cursor:pointer;">
                </div>`;
            list.appendChild(card);
        });
    }
    function resetCache() { if(confirm("초기화하시겠습니까?")) { localStorage.clear(); location.reload(); } }
    function renderHistory() { const q = document.getElementById('log-search').value.toLowerCase(); const h = document.getElementById('history-content'); h.innerHTML = originalLogs.map((log, i) => (q && !log.text.toLowerCase().includes(q) && !log.name.toLowerCase().includes(q)) ? '' : `<div class="history-item" onclick="jump(${i})"><div class="history-name-box" style="color:${charConfigs[log.name]?.color || '#fff'}; border-right:2px solid ${charConfigs[log.name]?.color || '#555'}; padding-right:10px;">${log.name}</div><div class="history-text-box">${log.text}</div></div>`).reverse().join(''); }
    function loadMedia(input, type) { const url = URL.createObjectURL(input.files[0]); if(type === 'audio') { const p = document.getElementById('bgm-player'); p.src = url; p.play(); } else { document.getElementById('bg-layer').style.backgroundImage = `url(${url})`; } }
    window.onload = loadSettings;
</script>
</body>
</html>
